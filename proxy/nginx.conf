# Rate limiting: 20 requests per second per IP, no burst
# Connection limiting: max 10 concurrent connections per IP
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

server {
    listen 80;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Keep connection limit global, but apply request-rate limit only to dynamic routes
    limit_conn connlimit 10;

    # Access and error logging to stdout/stderr for Docker
    access_log /dev/stdout combined;
    error_log /dev/stderr warn;

    # Include MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Root directory for static files
    root   /usr/share/nginx/html;
    index  index.html;

    # Hide nginx version for security
    server_tokens off;

    # Increase body size for file uploads
    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/css
        text/xml
        text/plain
        image/svg+xml
        application/xml
        text/javascript
        application/json
        application/xml+rss
        application/javascript;

    # Custom error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Handle static assets first with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # Frontend static files — served directly from the shared volume
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        limit_req zone=mylimit burst=40 nodelay;
        proxy_pass http://hackathon-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Admin panel
    location /admin/ {
        limit_req zone=mylimit burst=20 nodelay;
        proxy_pass http://hackathon-backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }



    # Deny access to sensitive files
    location ~* \.(htaccess|htpasswd|ini|log|conf)$ {
        deny all;
    }
}


